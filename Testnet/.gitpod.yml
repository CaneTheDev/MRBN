tasks:
  - name: MRBN Node
    init: |
      cd /workspace/MRBN/Testnet
      cargo build --release --bin mrbn-node
    command: |
      cd /workspace/MRBN/Testnet
      echo "========================================="
      echo "MRBN Node on Gitpod"
      echo "========================================="
      echo ""
      echo "To connect to your local bootstrap:"
      echo "1. Get your local node's Peer ID"
      echo "2. Get your public IP"
      echo "3. Run: cargo run --release --bin mrbn-node -- --bootstrap /ip4/YOUR_PUBLIC_IP/tcp/8333/p2p/PEER_ID --data-dir ./data_gitpod"
      echo ""
      gp sync-done build

ports:
  - port: 8333
    onOpen: ignore
    visibility: public
  - port: 8334
    onOpen: ignore
    visibility: public

vscode:
  extensions:
    - rust-lang.rust-analyzer
